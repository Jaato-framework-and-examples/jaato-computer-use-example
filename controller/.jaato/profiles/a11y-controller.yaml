name: a11y-controller
description: >-
  LLM controller for the jaato-a11y-bridge device. A vision model grounds over a
  set-of-marks screenshot + pruned node tree and drives the device through
  client-provided screen.* host tools. All grounding/settle/recovery policy is
  daemon-side (this controller); the device is a dumb mechanism (01-PROTOCOL.md).
provider: doubleword
model: Qwen/Qwen3-VL-235B-A22B-Instruct-FP8

plugin_configs:
  doubleword:
    # Resolved daemon-side from the user's pass store — never a literal key here.
    api_key: pass://jaato/doubleword/api-key
    # doubleword's /v1/models doesn't report a context length and the provider
    # refuses to guess (no-fallback rule), so pin the model's native 256K.
    context_length: 262144
    api_params:
      # Nonzero to avoid greedy repetition loops; a bit higher (0.6) since 0.4
      # still degenerated on unstable screens. Ref selection stays stable enough.
      temperature: 0.6
      # Hard cap on per-turn output. A driving turn is short reasoning + one
      # screen.* tool call; without a cap a degenerating model runs away
      # indefinitely (unbounded repetition), burning credits and hanging the
      # turn. With the cap it's cut off, the turn ends, and control returns.
      max_tokens: 1024
      # Realtime tier — interactive device driving can't tolerate flex's async
      # (minutes-level) latency; every turn is on the operator's critical path.
      service_tier: priority

# The agent's only tools are the client-provided screen.* host tools
# (register_client_tools). No runner-tier tool plugins are needed — and omitting
# cli/file_edit/etc. keeps the device agent's authority scoped to the screen.
plugins: []
